name: Android Build

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      server_url:
        description: "Server URL for the Capacitor WebView"
        required: false
        default: "https://f-guild.example.com"

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create dist placeholder
        run: mkdir -p dist && echo '<!DOCTYPE html><html><head><title>F-Guild</title></head><body></body></html>' > dist/index.html

      - name: Set Capacitor server URL
        run: |
          URL="${{ github.event.inputs.server_url || secrets.CAPACITOR_SERVER_URL || 'https://f-guild.example.com' }}"
          ./scripts/set-capacitor-url.sh "$URL"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: f-guild-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  distribute:
    needs: build-apk
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: f-guild-debug-${{ github.sha }}

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: internal-testers
          file: app-debug.apk
          releaseNotes: |
            Build from commit ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Message: ${{ github.event.head_commit.message }}
